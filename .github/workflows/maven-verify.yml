name: Maven verify

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Run the maven verify
        run: mvn -B -ntp verify
      - name: Run SonarCloud analysis on main branch
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -ntp org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=mivek_MetarParser
      - name: Write PR metadata
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .pr-meta
          echo "${{ github.event.number }}" > .pr-meta/pr_number
          echo "${{ github.event.pull_request.head.ref }}" > .pr-meta/head_ref
          echo "${{ github.event.pull_request.base.ref }}" > .pr-meta/base_ref
          echo "${{ github.event.pull_request.head.sha }}" > .pr-meta/head_sha
      - name: Upload build artifacts for Sonar
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sonar-build
          path: |
            **/target/classes/**
            **/target/test-classes/**
            **/target/site/jacoco/**
            **/target/surefire-reports/**
          retention-days: 1
          if-no-files-found: error
      - name: Upload PR metadata
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: .pr-meta/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  generate-docs:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Generate the javadoc
        run: mvn --batch-mode -ntp install -DskipTests && mvn --batch-mode -ntp javadoc:javadoc
